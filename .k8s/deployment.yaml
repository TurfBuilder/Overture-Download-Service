apiVersion: apps/v1
kind: Deployment
metadata:
  name: overture-downloader
  namespace: turfbuilder
  labels:
    app: overture-downloader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: overture-downloader
  template:
    metadata:
      labels:
        app: overture-downloader
    spec:
      containers:
        - name: overture-downloader
          # The CI workflow replaces the tag with the release version on deploy.
          image: ghcr.io/turfbuilder/overture-download-service:latest
          args:
            # In-cluster NATS address — adjust to your NATS service's DNS name.
            - --host=nats.nats.svc.cluster.local
            - --workers=1
          envFrom:
            # S3_ENDPOINT, S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY — synced
            # from GitHub secrets by the deploy workflow.
            - secretRef:
                name: overture-downloader-s3
          ports:
            - name: api
              containerPort: 23363
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            # Sized to fit the current 2GB nodes (~810Mi free each). A running
            # job can hold 1–2 GB (see docs/configuration.md), so heavy jobs
            # may OOM at this limit — add a bigger node pool and raise these
            # before real workloads.
            requests:
              cpu: 250m
              memory: 700Mi
            limits:
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: overture-downloader
  namespace: turfbuilder
  labels:
    app: overture-downloader
spec:
  selector:
    app: overture-downloader
  ports:
    - name: api
      port: 23363
      targetPort: api
