name: Release & Deploy

on:
  push:
    branches: [main]

# Serialize runs so two pushes can't compute the same build number or
# deploy out of order.
concurrency:
  group: release-deploy
  cancel-in-progress: false

permissions:
  contents: write # push the release tag and create the GitHub release
  packages: write # push the image to GHCR

env:
  IMAGE: ghcr.io/turfbuilder/overture-download-service
  NAMESPACE: turfbuilder

jobs:
  # Versions, builds, and publishes the release. Independent of the deploy:
  # a failed deploy leaves the release intact, and "Re-run failed jobs"
  # redeploys this exact version instead of minting a new one.
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # all tags are needed to compute today's build number

      # CalVer matching TurfBuilder's format: YY.M.D_<build number for the
      # day>, e.g. 26.7.9_0 then 26.7.9_1 for a second release the same day.
      - name: Compute version
        id: version
        run: |
          prefix="$(date -u +%y.%-m.%-d)"
          last="$(git tag -l "${prefix}_*" | sed -E "s/^${prefix}_([0-9]+).*$/\1/" | sort -n | tail -1)"
          version="${prefix}_$(( ${last:--1} + 1 ))"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $version"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

      # Tag and create the release only after the image exists, so a tag
      # always has a pullable image behind it.
      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "refs/tags/$VERSION"
          gh release create "$VERSION" --title "$VERSION" --generate-notes

  deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBE_CONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Sync namespace and secrets to the cluster
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: |
          kubectl create namespace "$NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic overture-downloader-s3 -n "$NAMESPACE" \
            --from-literal=S3_ENDPOINT="$S3_ENDPOINT" \
            --from-literal=S3_BUCKET="$S3_BUCKET" \
            --from-literal=S3_ACCESS_KEY="$S3_ACCESS_KEY" \
            --from-literal=S3_SECRET_KEY="$S3_SECRET_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          sed "s|${IMAGE}:latest|${IMAGE}:${VERSION}|" .k8s/deployment.yaml \
            | kubectl apply -f -
          kubectl rollout status deployment/overture-downloader \
            -n "$NAMESPACE" --timeout=5m
